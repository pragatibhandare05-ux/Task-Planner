<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup - Task Planner</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="login-container">


    <div class="login-box">


        <h1>Task Planner</h1>

        <h2>Create Account</h2>


        <form id="signupForm">


            <div class="input-group">

                <label>Name</label>

                <input 
                type="text"
                id="signupName"
                placeholder="Enter your name"
                required>

            </div>



            <div class="input-group">

                <label>Email</label>

                <input 
                type="email"
                id="signupEmail"
                placeholder="Enter your email"
                required>

            </div>



            <div class="input-group">

                <label>Password</label>

                <input 
                type="password"
                id="signupPassword"
                placeholder="Create password"
                required>

            </div>



            <div class="input-group">

                <label>Confirm Password</label>

                <input 
                type="password"
                id="confirmPassword"
                placeholder="Confirm password"
                required>

            </div>



            <button type="submit">

                Create Account

            </button>



            <p>

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </p>



        </form>


    </div>


</div>
<script src="signup.js"></script>
</body>

</html>
