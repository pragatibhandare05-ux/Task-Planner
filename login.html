<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Task Planner</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#671b85">

</head>


<body>


<div class="login-container">


    <div class="login-box">


        <h1>Task Planner</h1>

        <h2>Login</h2>


        <form id="loginForm">


            <!-- Email -->

            <div class="input-group">

                <label>Email</label>

                <input 
                type="email"
                id="loginEmail"
                placeholder="Enter your email"
                required>

            </div>



            <!-- Password -->

            <div class="input-group">

                <label>Password</label>


                <div class="password-box">


                    <input 
                    type="password"
                    id="loginPassword"
                    placeholder="Enter your password"
                    required>


                    <span id="togglePassword">
                        👁️
                    </span>


                </div>


            </div>




            <!-- Login Button -->

            <button type="submit">
                Login
            </button>



        </form>



        <p>
            Don't have an account?

            <a href="signup.html">
                Create Account
            </a>

        </p>



    </div>


</div>



<script src="auth.js"></script>


</body>

</html>
